name: Release XPMT

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: windows-latest
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm install

      - name: Setup signing key (Linux/macOS)
        if: matrix.platform != 'windows-latest'
        run: |
          mkdir -p ~/.tauri
          echo "$TAURI_KEY" > ~/.tauri/sign.key
          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$HOME/.tauri/sign.key" >> $GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$TAURI_PASS" >> $GITHUB_ENV
        env:
          TAURI_KEY:  ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Setup signing key (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:USERPROFILE\.tauri"
          $env:TAURI_KEY | Out-File -FilePath "$env:USERPROFILE\.tauri\sign.key" -Encoding utf8 -NoNewline
          echo "TAURI_SIGNING_PRIVATE_KEY_PATH=$env:USERPROFILE\.tauri\sign.key" >> $env:GITHUB_ENV
          echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$env:TAURI_PASS" >> $env:GITHUB_ENV
        env:
          TAURI_KEY:  ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_PASS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'XPMT ${{ github.ref_name }}'
          releaseBody:  |
            ## XPMT ${{ github.ref_name }}

            ### Download for your platform:
            | Platform | File |
            |----------|------|
            | 🐧 Linux | `.deb` or `.AppImage` |
            | 🪟 Windows | `.msi` (recommended) |
            | 🍎 macOS | `.dmg` |

            ### ⚠️ Windows note
            Click **"More info" → "Run anyway"** to install.
            XPMT is open source: github.com/AquilaWilfred/xpmt
          releaseDraft: false
          prerelease:   false
