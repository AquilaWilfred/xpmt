name: Release XPMT

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: '--bundles deb,rpm,appimage,updater'
          - platform: windows-latest
            args: '--bundles msi,nsis,updater'
          - platform: macos-latest
            args: '--bundles dmg,updater'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend deps
        run: npm install

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'XPMT ${{ github.ref_name }}'
          releaseBody:  |
            ## XPMT ${{ github.ref_name }}

            ### Download for your platform:
            | Platform | File |
            |----------|------|
            | 🐧 Linux | `.deb` or `.AppImage` |
            | 🪟 Windows | `.msi` (recommended) |
            | 🍎 macOS | `.dmg` |

            ### ⚠️ Windows note
            Click **"More info" → "Run anyway"** to install.
            XPMT is open source: github.com/AquilaWilfred/xpmt
          releaseDraft: false
          prerelease:   false
          args:         ${{ matrix.args }}
